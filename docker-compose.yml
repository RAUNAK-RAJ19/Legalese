services:
  redis:
    image: redis:7-alpine

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      APP_CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        # Use localhost so the browser (running on host) can reach the backend at host:8000
        VITE_API_BASE_URL: http://localhost:8000
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend